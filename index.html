<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Playground</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d7deea;
      --accent: #0f7b6c;
      --accent-2: #d44d2f;
      --shadow: 0 18px 45px rgba(30, 41, 59, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(15, 123, 108, .12), transparent 34%),
        linear-gradient(315deg, rgba(212, 77, 47, .10), transparent 32%),
        var(--bg);
      color: var(--ink);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      min-height: 38px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover { border-color: #aeb9cc; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .app {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(10px);
      padding: 22px;
      overflow-y: auto;
    }

    main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .72);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1;
      letter-spacing: 0;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .danger {
      border-color: #f1c8bf;
      color: #a43b25;
    }

    .panel {
      margin-bottom: 18px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0;
      color: var(--muted);
    }

    .upload {
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px dashed #aeb9cc;
      border-radius: 8px;
      background: #f8fafc;
    }

    .upload input { width: 100%; }

    .control {
      display: grid;
      gap: 7px;
      margin: 12px 0;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .control input[type="range"] { width: 100%; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      border-radius: 50%;
    }

    .text-input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }

    .stage-wrap {
      display: grid;
      place-items: center;
      padding: 24px;
      min-width: 0;
      overflow: auto;
    }

    .stage {
      display: grid;
      place-items: center;
      width: min(100%, 1120px);
      min-height: min(72vh, 760px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(45deg, #e7ecf4 25%, transparent 25%),
        linear-gradient(-45deg, #e7ecf4 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e7ecf4 75%),
        linear-gradient(-45deg, transparent 75%, #e7ecf4 75%);
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    canvas {
      max-width: 100%;
      max-height: 76vh;
      background: transparent;
      touch-action: none;
    }

    .empty {
      max-width: 420px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, .85);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .empty strong {
      display: block;
      color: var(--ink);
      font-size: 20px;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      word-break: break-word;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      header { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .stage-wrap { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <section class="panel">
        <h2>Image</h2>
        <div class="upload">
          <input id="file" type="file" accept="image/*">
          <div class="meta" id="meta">选择一张图片开始编辑。</div>
        </div>
      </section>

      <section class="panel">
        <h2>Adjust</h2>
        <div class="control">
          <label for="brightness">亮度 <span id="brightnessValue">100%</span></label>
          <input id="brightness" type="range" min="0" max="200" value="100">
        </div>
        <div class="control">
          <label for="contrast">对比度 <span id="contrastValue">100%</span></label>
          <input id="contrast" type="range" min="0" max="200" value="100">
        </div>
        <div class="control">
          <label for="saturation">饱和度 <span id="saturationValue">100%</span></label>
          <input id="saturation" type="range" min="0" max="220" value="100">
        </div>
        <div class="control">
          <label for="blur">柔化 <span id="blurValue">0px</span></label>
          <input id="blur" type="range" min="0" max="12" value="0">
        </div>
      </section>

      <section class="panel">
        <h2>Transform</h2>
        <div class="row">
          <button id="rotateLeft" title="向左旋转">↺ 左转</button>
          <button id="rotateRight" title="向右旋转">↻ 右转</button>
          <button id="flipX" title="水平翻转">⇄ 水平</button>
          <button id="flipY" title="垂直翻转">⇅ 垂直</button>
        </div>
      </section>

      <section class="panel">
        <h2>Text</h2>
        <input class="text-input" id="caption" placeholder="添加文字水印">
        <div class="control">
          <label for="fontSize">字号 <span id="fontSizeValue">48px</span></label>
          <input id="fontSize" type="range" min="18" max="140" value="48">
        </div>
        <div class="swatches" aria-label="文字颜色">
          <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="白色"></button>
          <button class="swatch" data-color="#172033" style="background:#172033" title="深色"></button>
          <button class="swatch" data-color="#0f7b6c" style="background:#0f7b6c" title="绿色"></button>
          <button class="swatch" data-color="#d44d2f" style="background:#d44d2f" title="红色"></button>
          <button class="swatch" data-color="#f2b84b" style="background:#f2b84b" title="黄色"></button>
        </div>
      </section>

      <section class="panel">
        <h2>Draw</h2>
        <div class="row">
          <button id="drawMode">✎ 画笔</button>
          <button id="clearInk" class="danger">清除标注</button>
        </div>
        <div class="control">
          <label for="brushSize">画笔 <span id="brushSizeValue">8px</span></label>
          <input id="brushSize" type="range" min="2" max="36" value="8">
        </div>
        <div class="swatches" aria-label="画笔颜色">
          <button class="swatch brush" data-color="#d44d2f" style="background:#d44d2f" title="红色"></button>
          <button class="swatch brush" data-color="#0f7b6c" style="background:#0f7b6c" title="绿色"></button>
          <button class="swatch brush" data-color="#172033" style="background:#172033" title="深色"></button>
          <button class="swatch brush" data-color="#ffffff" style="background:#ffffff" title="白色"></button>
        </div>
      </section>
    </aside>

    <main>
      <header>
        <div>
          <h1>Image Playground</h1>
          <p class="sub">本地编辑图片，不上传服务器。</p>
        </div>
        <div class="actions">
          <button id="reset">重置</button>
          <button id="download" class="primary" disabled>下载 PNG</button>
        </div>
      </header>
      <div class="stage-wrap">
        <div class="stage">
          <div class="empty" id="empty">
            <strong>拖入或选择图片</strong>
            <span>调整滤镜、添加文字和手绘标注后导出。</span>
          </div>
          <canvas id="canvas" hidden></canvas>
        </div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      image: null,
      fileName: 'image-playground.png',
      brightness: 100,
      contrast: 100,
      saturation: 100,
      blur: 0,
      rotation: 0,
      flipX: 1,
      flipY: 1,
      caption: '',
      textColor: '#ffffff',
      fontSize: 48,
      brushColor: '#d44d2f',
      brushSize: 8,
      drawing: false,
      drawMode: false,
      strokes: []
    };

    const canvas = document.querySelector('#canvas');
    const ctx = canvas.getContext('2d');
    const empty = document.querySelector('#empty');
    const download = document.querySelector('#download');
    const meta = document.querySelector('#meta');

    const controls = ['brightness', 'contrast', 'saturation', 'blur', 'fontSize', 'brushSize'];
    const byId = id => document.getElementById(id);

    function updateLabels() {
      byId('brightnessValue').textContent = `${state.brightness}%`;
      byId('contrastValue').textContent = `${state.contrast}%`;
      byId('saturationValue').textContent = `${state.saturation}%`;
      byId('blurValue').textContent = `${state.blur}px`;
      byId('fontSizeValue').textContent = `${state.fontSize}px`;
      byId('brushSizeValue').textContent = `${state.brushSize}px`;
      byId('drawMode').classList.toggle('primary', state.drawMode);
    }

    function fitCanvas(image) {
      const maxSide = 1800;
      const scale = Math.min(1, maxSide / Math.max(image.naturalWidth, image.naturalHeight));
      canvas.width = Math.round(image.naturalWidth * scale);
      canvas.height = Math.round(image.naturalHeight * scale);
    }

    function render() {
      updateLabels();
      if (!state.image) return;

      const image = state.image;
      const rotated = state.rotation % 180 !== 0;
      const width = rotated ? canvas.height : canvas.width;
      const height = rotated ? canvas.width : canvas.height;

      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(state.rotation * Math.PI / 180);
      ctx.scale(state.flipX, state.flipY);
      ctx.filter = `brightness(${state.brightness}%) contrast(${state.contrast}%) saturate(${state.saturation}%) blur(${state.blur}px)`;
      ctx.drawImage(image, -width / 2, -height / 2, width, height);
      ctx.restore();

      ctx.filter = 'none';
      drawStrokes();
      drawCaption();
    }

    function drawCaption() {
      if (!state.caption.trim()) return;
      const padding = Math.max(20, canvas.width * .035);
      ctx.save();
      ctx.font = `700 ${state.fontSize}px Inter, system-ui, sans-serif`;
      ctx.textBaseline = 'bottom';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = 'rgba(0,0,0,.55)';
      ctx.lineWidth = Math.max(4, state.fontSize * .12);
      ctx.fillStyle = state.textColor;
      const text = state.caption.trim();
      const maxWidth = canvas.width - padding * 2;
      ctx.strokeText(text, padding, canvas.height - padding, maxWidth);
      ctx.fillText(text, padding, canvas.height - padding, maxWidth);
      ctx.restore();
    }

    function drawStrokes() {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (const stroke of state.strokes) {
        if (stroke.points.length < 2) continue;
        ctx.strokeStyle = stroke.color;
        ctx.lineWidth = stroke.size;
        ctx.beginPath();
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (const point of stroke.points.slice(1)) ctx.lineTo(point.x, point.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function loadFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => {
          state.image = image;
          state.fileName = file.name.replace(/\.[^.]+$/, '') + '-edited.png';
          state.strokes = [];
          fitCanvas(image);
          canvas.hidden = false;
          empty.hidden = true;
          download.disabled = false;
          meta.textContent = `${file.name} · ${image.naturalWidth}×${image.naturalHeight}`;
          render();
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function pointerPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    byId('file').addEventListener('change', event => loadFile(event.target.files[0]));

    document.addEventListener('dragover', event => event.preventDefault());
    document.addEventListener('drop', event => {
      event.preventDefault();
      loadFile(event.dataTransfer.files[0]);
    });

    controls.forEach(id => {
      byId(id).addEventListener('input', event => {
        state[id] = Number(event.target.value);
        render();
      });
    });

    byId('caption').addEventListener('input', event => {
      state.caption = event.target.value;
      render();
    });

    document.querySelectorAll('.swatch:not(.brush)').forEach(button => {
      button.addEventListener('click', () => {
        state.textColor = button.dataset.color;
        render();
      });
    });

    document.querySelectorAll('.brush').forEach(button => {
      button.addEventListener('click', () => {
        state.brushColor = button.dataset.color;
      });
    });

    byId('rotateLeft').addEventListener('click', () => {
      state.rotation = (state.rotation + 270) % 360;
      render();
    });

    byId('rotateRight').addEventListener('click', () => {
      state.rotation = (state.rotation + 90) % 360;
      render();
    });

    byId('flipX').addEventListener('click', () => {
      state.flipX *= -1;
      render();
    });

    byId('flipY').addEventListener('click', () => {
      state.flipY *= -1;
      render();
    });

    byId('drawMode').addEventListener('click', () => {
      state.drawMode = !state.drawMode;
      updateLabels();
    });

    byId('clearInk').addEventListener('click', () => {
      state.strokes = [];
      render();
    });

    byId('reset').addEventListener('click', () => {
      Object.assign(state, {
        brightness: 100,
        contrast: 100,
        saturation: 100,
        blur: 0,
        rotation: 0,
        flipX: 1,
        flipY: 1,
        caption: '',
        textColor: '#ffffff',
        fontSize: 48,
        brushColor: '#d44d2f',
        brushSize: 8,
        drawMode: false,
        strokes: []
      });
      for (const id of controls) byId(id).value = state[id];
      byId('caption').value = '';
      render();
    });

    byId('download').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = state.fileName;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    canvas.addEventListener('pointerdown', event => {
      if (!state.drawMode || !state.image) return;
      canvas.setPointerCapture(event.pointerId);
      state.drawing = true;
      state.strokes.push({
        color: state.brushColor,
        size: state.brushSize,
        points: [pointerPoint(event)]
      });
    });

    canvas.addEventListener('pointermove', event => {
      if (!state.drawing) return;
      state.strokes[state.strokes.length - 1].points.push(pointerPoint(event));
      render();
    });

    canvas.addEventListener('pointerup', () => {
      state.drawing = false;
    });

    updateLabels();
  </script>
</body>
</html>
